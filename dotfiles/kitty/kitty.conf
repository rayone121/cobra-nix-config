# Matugen-generated colors (ignored if file doesn't exist yet)
include colors.conf

font_family JetBrainsMono Nerd Font
font_size 12
background_opacity 0.92
window_padding_width 12
confirm_os_window_close 0
hide_window_decorations yes

# Fallback dark colors (overridden by colors.conf when matugen runs)
background #1e1e1e
foreground #e0e0e0
cursor #ffffff
selection_background #3a3a3a
selection_foreground #ffffff
