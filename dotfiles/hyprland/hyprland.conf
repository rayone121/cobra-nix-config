# Import matugen-generated colors
source = ~/.config/hypr/colors.conf

# ---------- Monitor ----------
monitor = , preferred, auto, 1

# ---------- Environment ----------
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct

# ---------- Startup ----------
exec-once = waybar
exec-once = dunst
exec-once = awww-daemon

# ---------- Input ----------
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
    }
}

# ---------- General ----------
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(ffffffaa)
    col.inactive_border = rgba(ffffff22)
    layout = dwindle
    allow_tearing = false
}

# ---------- Decoration ----------
decoration {
    rounding = 12
    blur {
        enabled = true
        size = 5
        passes = 2
        new_optimizations = true
    }
    shadow {
        enabled = true
        range = 8
        render_power = 2
        color = rgba(1a1a1aee)
    }
}

# ---------- Animations ----------
animations {
    enabled = true
    bezier = ease, 0.25, 0.1, 0.25, 1
    animation = windows, 1, 4, ease
    animation = windowsOut, 1, 4, ease, popin 80%
    animation = fade, 1, 4, ease
    animation = workspaces, 1, 4, ease
}

# ---------- Layouts ----------
dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

# ---------- Scrolling layout plugin ----------
plugin {
    hyprscrolling {
        column_default_width = 0.5
        focus_wrap = true
        gesture_scroll = true
    }
}

# ---------- Misc ----------
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

# ---------- Keybindings ----------
$mod = SUPER

# Layout switching
bind = $mod, D, exec, hyprctl keyword general:layout dwindle
bind = $mod, S, exec, hyprctl keyword general:layout scrolling

# Core
bind = $mod, Return, exec, kitty
bind = $mod, Q, killactive
bind = $mod, M, exit
bind = $mod, V, togglefloating
bind = $mod, Space, exec, fuzzel
bind = $mod, P, pseudo
bind = $mod, J, togglesplit
bind = $mod, F, fullscreen
bind = $mod, E, exec, nautilus

# Move focus (vim)
bind = $mod, h, movefocus, l
bind = $mod, l, movefocus, r
bind = $mod, k, movefocus, u
bind = $mod, j, movefocus, d

# Move focus (arrows)
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# Move windows (vim)
bind = $mod SHIFT, h, movewindow, l
bind = $mod SHIFT, l, movewindow, r
bind = $mod SHIFT, k, movewindow, u
bind = $mod SHIFT, j, movewindow, d

# Move windows (arrows)
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, down, movewindow, d

# Resize
bind = $mod CTRL, h, resizeactive, -40 0
bind = $mod CTRL, l, resizeactive, 40 0
bind = $mod CTRL, k, resizeactive, 0 -40
bind = $mod CTRL, j, resizeactive, 0 40

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move window to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Scroll through workspaces
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# Mouse bindings
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Screenshot
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT, Print, exec, grim - | wl-copy

# Media / brightness
bindel = , XF86AudioRaiseVolume, exec, pamixer -i 5
bindel = , XF86AudioLowerVolume, exec, pamixer -d 5
bindel = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindl = , XF86AudioMute, exec, pamixer -t
